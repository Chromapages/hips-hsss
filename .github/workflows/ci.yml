name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (Node.js ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node: ['20']
        package:
          - '@hips/web'
          - '@hips/types'
          - '@hips/ui'
          - '@hips/eslint-config'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm typecheck

      - name: Lint (all packages)
        run: pnpm lint

      - name: Test (unit + integration)
        run: pnpm test

      - name: Build (all packages)
        run: pnpm build

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Check copy policy compliance
        run: pnpm copycheck

  session-services:
    name: CI - Session Services
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        service: ['@hips/session', '@hips/vault', '@hips/safety']

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm audit --audit-level=high
