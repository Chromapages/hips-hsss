name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into Node.js 24 runner actions now — avoids the June 2026 forced cutover
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: CI (Node.js ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        node: ['22']
        package:
          - '@hips/web'
          - '@hips/types'
          - '@hips/ui'
          - '@hips/eslint-config'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── Prisma generate ────────────────────────────────────────────────────
      # The vault and session schemas output to paths that must exist before
      # tsc runs. Neither path is committed to git, so we generate here.
      - name: Generate Prisma clients
        run: |
          pnpm --filter @hips/db exec prisma generate --schema=./prisma/commerce.prisma
          pnpm --filter @hips/db exec prisma generate --schema=./prisma/vault.prisma
          pnpm --filter @hips/session exec prisma generate --schema=./prisma/session.prisma

      - name: Typecheck (all packages)
        run: pnpm typecheck

      - name: Lint (all packages)
        run: pnpm lint

      - name: Test (unit + integration)
        run: pnpm test

      - name: Build (all packages)
        run: pnpm build

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Check copy policy compliance
        run: pnpm copycheck

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4

  session-services:
    name: CI - Session Services
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        service: ['@hips/session', '@hips/vault', '@hips/safety']

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # Generate Prisma clients before typecheck
      - name: Generate Prisma clients
        run: |
          pnpm --filter @hips/db exec prisma generate --schema=./prisma/vault.prisma
          pnpm --filter @hips/session exec prisma generate --schema=./prisma/session.prisma

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm audit --audit-level=high

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ci]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: |
          pnpm --filter @hips/db exec prisma generate --schema=./prisma/commerce.prisma
          pnpm --filter @hips/db exec prisma generate --schema=./prisma/vault.prisma
          pnpm --filter @hips/session exec prisma generate --schema=./prisma/session.prisma

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build web app
        run: pnpm --filter @hips/web build

      - name: Run E2E tests
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          DATABASE_URL: postgresql://test:test@localhost:5432/hips_test
          SESSION_DATABASE_URL: postgresql://test:test@localhost:5432/hips_session_test
          VAULT_DATABASE_URL: postgresql://test:test@localhost:5432/hips_vault_test
          FIREBASE_PROJECT_ID: test-project
          FIREBASE_CLIENT_EMAIL: test@test.iam
          FIREBASE_PRIVATE_KEY: 'test-key'
        run: |
          pnpm --filter @hips/web start &
          sleep 10
          npx playwright test
          pkill -f "next start" || true

  # ─── CDK infrastructure ─────────────────────────────────────────────────────
  # Must run first on main pushes — creates ECR repos that image-push depends on.
  cdk-deploy:
    name: Deploy CDK Infrastructure (Staging)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install CDK dependencies
        run: cd infra && pnpm install --frozen-lockfile

      - name: Build CDK app
        run: cd infra && pnpm build

      - name: Bootstrap CDK (idempotent — safe to run every time)
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          cd infra && pnpm exec cdk bootstrap \
            "aws://${ACCOUNT_ID}/us-east-1" \
            --context environment=staging
        continue-on-error: false

      - name: Synth CDK
        env:
          ENVIRONMENT: staging
        run: cd infra && pnpm exec cdk synth --context environment=staging

      - name: Deploy CDK
        env:
          ENVIRONMENT: staging
        run: |
          cd infra && pnpm exec cdk deploy --all \
            --context environment=staging \
            --require-approval never \
            --verbose
        continue-on-error: true

  # ─── Build & push Docker images to ECR ──────────────────────────────────────
  # Runs after CDK so ECR repos are guaranteed to exist.
  # Decoupled from e2e — e2e only runs on PRs, not on main pushes.
  build-and-push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ci, cdk-deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push vault-service
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/hips-vault-service:$IMAGE_TAG \
                       -t $ECR_REGISTRY/hips-vault-service:latest \
                       ./services/vault
          docker push $ECR_REGISTRY/hips-vault-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/hips-vault-service:latest

      - name: Build and push session-service
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/hips-session-service:$IMAGE_TAG \
                       -t $ECR_REGISTRY/hips-session-service:latest \
                       ./services/session
          docker push $ECR_REGISTRY/hips-session-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/hips-session-service:latest

      - name: Build and push safety-service
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/hips-safety-service:$IMAGE_TAG \
                       -t $ECR_REGISTRY/hips-safety-service:latest \
                       ./services/safety
          docker push $ECR_REGISTRY/hips-safety-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/hips-safety-service:latest

  # ─── Migrate databases ───────────────────────────────────────────────────────
  migrate-databases:
    name: Run Prisma Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-and-push-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Run vault migration as one-off ECS task
      - name: Migrate vault DB
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster hips-platform-staging \
            --task-definition HipsEcsStack-staging-VaultTaskDef \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNET_ID }}],securityGroups=[${{ secrets.VAULT_SG_ID }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"vault-service","command":["npx","prisma","migrate","deploy","--schema=../../packages/db/prisma/vault.prisma"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster hips-platform-staging --tasks $TASK_ARN
          EXIT=$(aws ecs describe-tasks --cluster hips-platform-staging --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' --output text)
          [ "$EXIT" = "0" ] || exit 1

      # Run session migration as one-off ECS task
      - name: Migrate session DB
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster hips-platform-staging \
            --task-definition HipsEcsStack-staging-SessionTaskDef \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNET_ID }}],securityGroups=[${{ secrets.SESSION_SG_ID }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"session-service","command":["npx","prisma","migrate","deploy","--schema=./prisma/session.prisma"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster hips-platform-staging --tasks $TASK_ARN
          EXIT=$(aws ecs describe-tasks --cluster hips-platform-staging --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' --output text)
          [ "$EXIT" = "0" ] || exit 1

  # ─── Deploy staging ──────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [migrate-databases]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Force new ECS deployment (staging)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecs update-service \
            --cluster hips-platform-staging \
            --service vault-service \
            --force-new-deployment \
            --region us-east-1
          aws ecs update-service \
            --cluster hips-platform-staging \
            --service session-service \
            --force-new-deployment \
            --region us-east-1
          aws ecs update-service \
            --cluster hips-platform-staging \
            --service safety-service \
            --force-new-deployment \
            --region us-east-1

      - name: Wait for ECS services to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster hips-platform-staging \
            --services vault-service session-service safety-service \
            --region us-east-1

      - name: Deploy web app
        run: pnpm --filter @hips/web deploy:staging

  # ─── Deploy production ───────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://hips.org

    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag images for production (immutable — use git SHA)
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Tag with SHA for immutable traceability — never overwrite staging images
          docker pull $ECR_REGISTRY/hips-vault-service:$IMAGE_TAG
          docker pull $ECR_REGISTRY/hips-session-service:$IMAGE_TAG
          docker pull $ECR_REGISTRY/hips-safety-service:$IMAGE_TAG

          docker tag $ECR_REGISTRY/hips-vault-service:$IMAGE_TAG    $ECR_REGISTRY/hips-vault-service:prod-$IMAGE_TAG
          docker tag $ECR_REGISTRY/hips-session-service:$IMAGE_TAG  $ECR_REGISTRY/hips-session-service:prod-$IMAGE_TAG
          docker tag $ECR_REGISTRY/hips-safety-service:$IMAGE_TAG   $ECR_REGISTRY/hips-safety-service:prod-$IMAGE_TAG

          docker push $ECR_REGISTRY/hips-vault-service:prod-$IMAGE_TAG
          docker push $ECR_REGISTRY/hips-session-service:prod-$IMAGE_TAG
          docker push $ECR_REGISTRY/hips-safety-service:prod-$IMAGE_TAG

      - name: Wait for staging deployment verification
        run: sleep 60

      - name: Deploy to production ECS
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecs update-service \
            --cluster hips-platform-production \
            --service vault-service \
            --force-new-deployment \
            --region us-east-1
          aws ecs update-service \
            --cluster hips-platform-production \
            --service session-service \
            --force-new-deployment \
            --region us-east-1
          aws ecs update-service \
            --cluster hips-platform-production \
            --service safety-service \
            --force-new-deployment \
            --region us-east-1

      - name: Deploy web app to production
        run: pnpm --filter @hips/web deploy:production
